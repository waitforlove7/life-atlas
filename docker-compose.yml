services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: life-atlas-db
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: lifeatlas
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas -d lifeatlas']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
